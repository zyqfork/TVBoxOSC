name: build-tvbox

on:
  schedule:
    - cron: 0 20 * * *
  workflow_dispatch:
    inputs:
      rebuild:
        description: '忽略构建记录以重新构建'
        required: false
        type: boolean
      donotpublish:
        description: '构建后不提交发布新版'
        required: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - userName: q215613905
            repoName: TVBoxOS
            branchName: main
            jdkVersion: 17
          - userName: takagen99
            repoName: Box
            branchName: main
            jdkVersion: 17
          - userName: zyqfork
            repoName: TVBox
            branchName: 4.4
            jdkVersion: 17
          - userName: FongMi
            repoName: TV
            branchName: fongmi
            jdkVersion: 17

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure Table Format
        if: ${{ env.commit }}
        run: |
          # 检查是否存在 Build Time 列,如果不存在则添加
          if ! grep -q "| Build Time |" README.md; then
            sed -i '/| Repository.*| Branch.*| Last Update/s/|$/| Build Time |/' README.md
            sed -i '/|--*|--*|--*/s/|$/|--*|/' README.md
            sed -i '/\[.*\].*|.*|.*[a-z0-9]\{40\}/s/|$/| - |/' README.md
          fi

      - name: Check New Commit
        run: |
          upStream=https://github.com/${{ matrix.userName }}/${{ matrix.repoName }}
          echo "upStream=$upStream" >> $GITHUB_ENV
          # 通过 GitHub API 查询分支最新 commit（/commits/{ref} 返回单个对象，取 .sha）
          commit=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ matrix.userName }}/${{ matrix.repoName }}/commits/${{ matrix.branchName }}" \
            | jq -r '.sha // empty')
          # 校验 commit 必须是 40 位 hash，否则视为无效
          if [[ ! "${commit}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "无法获取有效 commit，跳过构建。commit='${commit}'"
            commit=""
          fi
          if [[ -n "${commit}" ]] && ( ! grep -q "$commit" README.md || [ "${{ inputs.rebuild }}" == "true" ] ); then
            echo "commit=$commit" >> $GITHUB_ENV
            echo "commitS=${commit:0:7}" >> $GITHUB_ENV
          fi
          echo "commit=$commit"

      - name: Checkout Source Code
        if: ${{ env.commit }}
        run: |
          git clone ${{ env.upStream }} TVBoxOSC
          cd TVBoxOSC
          git checkout ${{ env.commit }}
          echo "tag=$(git log --date=format:'%Y%m%d-%H%M' --pretty=format:%cd -1 ${{ env.commit }})" >> $GITHUB_ENV

      - name: Build FongMi Media3 Fork
        if: ${{ env.commit && matrix.userName == 'FongMi' && matrix.repoName == 'TV' }}
        run: |
          set -euo pipefail

          MEDIA3_REPO="${{ github.workspace }}/media3-local-repo"
          mkdir -p "$MEDIA3_REPO"

          git clone --depth=1 --branch=release-1.10.1-fongmi \
            https://github.com/FongMi/media "${{ github.workspace }}/fongmi-media"
          cd "${{ github.workspace }}/fongmi-media"
          chmod +x gradlew

          # init script 激活 publish.gradle（它检测 gradle.ext.rootProjectIsAndroidXMedia3）
          cat > /tmp/media3-init.gradle << 'INITEOF'
          gradle.ext.rootProjectIsAndroidXMedia3 = true
          INITEOF

          # maven-publish 插件生成的任务名为 publish{Publication}PublicationTo{Repository}MavenRepository
          # publication 名为 release，repository 名为 maven（默认），故任务名为 publishReleasePublicationToMavenRepository
          echo "可用的 publish 任务:"
          ./gradlew tasks --all 2>/dev/null | grep -i "publishReleasePublicationToMavenRepository" || true

          # 构建并发布必需的模块到本地 Maven
          ./gradlew \
            :lib-common:publishReleasePublicationToMavenRepository \
            :lib-datasource:publishReleasePublicationToMavenRepository \
            :lib-datasource-okhttp:publishReleasePublicationToMavenRepository \
            :lib-session:publishReleasePublicationToMavenRepository \
            :lib-ui-danmaku:publishReleasePublicationToMavenRepository \
            --init-script /tmp/media3-init.gradle \
            -PmavenRepo="$MEDIA3_REPO" \
            -PreleaseVersion=1.10.1 \
            --no-daemon --parallel

          echo "media3Repo=$MEDIA3_REPO" >> $GITHUB_ENV
          echo "FongMi Media3 构建完成，发布到: $MEDIA3_REPO"

          # 验证产物是否生成
          echo "=== 发布的产物 ==="
          ls -la "$MEDIA3_REPO/androidx/media3/" 2>/dev/null || { echo "错误: 发布目录为空"; exit 1; }

          # 验证必需的 artifact 都存在
          for artifact in media3-common media3-session media3-ui-danmaku; do
            if [ -z "$(find "$MEDIA3_REPO/androidx/media3/$artifact" -name '*.aar' 2>/dev/null | head -1)" ]; then
              echo "错误: 缺少 $artifact 产物"; exit 1
            fi
          done
          echo "所有必需产物验证通过"

      - name: Setup Python 3.10
        if: ${{ env.commit }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Extra Modify
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          set -euo pipefail

          # 为 FongMi/TV 注入本地 media3 Maven 仓库 + 依赖声明
          if [ "${{ matrix.userName }}" == "FongMi" ] && [ "${{ matrix.repoName }}" == "TV" ]; then
            echo "注入 FongMi media3 本地仓库: ${{ env.media3Repo }}"

            # 验证 media3Repo 已设置
            if [ -z "${{ env.media3Repo }}" ]; then
              echo "错误: media3Repo 环境变量未设置，Media3 fork 构建可能失败"; exit 1
            fi

            # 在 settings.gradle 的 google() 之前插入本地 Maven（确保优先级高于 Google Maven）
            sed -i "s|google()|maven { url 'file://${{ env.media3Repo }}' }\n        google()|" settings.gradle

            # 在 libs.versions.toml 的 [versions] 块末尾追加 media3 版本
            sed -i '/^\[libraries\]/i media3 = "1.10.1"\n' gradle/libs.versions.toml

            # 在 libs.versions.toml 的 [libraries] 块末尾追加三个 media3 库条目
            sed -i '/^\[bundles\]/i media3-common = { group = "androidx.media3", name = "media3-common", version.ref = "media3" }\nmedia3-session = { group = "androidx.media3", name = "media3-session", version.ref = "media3" }\nmedia3-ui-danmaku = { group = "androidx.media3", name = "media3-ui-danmaku", version.ref = "media3" }\n' gradle/libs.versions.toml

            # 在 app/build.gradle 的 dependencies 块里追加三条 implementation
            sed -i '/^    annotationProcessor libs.room.compiler/i\    implementation libs.media3.common\n    implementation libs.media3.session\n    implementation libs.media3.ui.danmaku' app/build.gradle

            # 验证注入是否生效
            echo "=== 验证 media3 注入结果 ==="
            echo "--- settings.gradle media3 仓库 ---"
            grep -n "media3-local-repo" settings.gradle || { echo "错误: settings.gradle 注入失败"; exit 1; }
            echo "--- libs.versions.toml media3 条目 ---"
            grep -n "media3" gradle/libs.versions.toml || { echo "错误: libs.versions.toml 注入失败"; exit 1; }
            echo "--- app/build.gradle media3 依赖 ---"
            grep -n "media3" app/build.gradle || { echo "错误: app/build.gradle 注入失败"; exit 1; }
            echo "media3 依赖配置完成且验证通过"
          fi

          echo 'crosswalk源,防挂'
          if grep -q 'crosswalk' build.gradle; then
            sed -i "/crosswalk/a\        maven { url 'https://o0halflife0o.github.io/crosswalk/releases/crosswalk/android/maven2' }" build.gradle
          else
            sed -i "/jitpack.io/a\        maven { url 'https://o0halflife0o.github.io/crosswalk/releases/crosswalk/android/maven2' }" build.gradle
          fi
          
          # 处理 Chaquopy Python 配置
          if [ -f "chaquo/build.gradle" ]; then
            echo "检测到 chaquo 模块,开始配置 Python 环境"
          
            # 验证 Python 3.10
            python3.10 --version
            PYTHON_PATH=$(which python3.10)
            echo "Python 路径: $PYTHON_PATH"
          
            # 更新 Chaquopy 版本到 15.0.1
            sed -i 's/\(com.chaquo.python:gradle:\)[0-9.]\+/\115.0.1/g' build.gradle
          
            # 在 python 块中添加 buildPython 配置
            # 在 version "3.10" 这行后面添加 buildPython
            sed -i "/version \"3.10\"/a\            buildPython \"$PYTHON_PATH\"" chaquo/build.gradle
          
            # 更新 minSdkVersion (如果需要)
            sed -i 's/minSdkVersion 19/minSdkVersion 21/g' chaquo/build.gradle 2>/dev/null || true
            sed -i 's/minSdkVersion 19/minSdkVersion 21/g' app/build.gradle 2>/dev/null || true
          
            echo "Python 环境配置完成"
          
            # 显示修改后的配置
            echo "=== chaquo/build.gradle python 配置 ==="
            sed -n '/python {/,/^[[:space:]]*}/p' chaquo/build.gradle
          fi
          
          # 处理 Pyramid Python 配置（用于 zyqfork/TVBox）
          if [ -f "pyramid/build.gradle" ]; then
            echo "检测到 pyramid 模块,开始配置 Python 环境"
          
            # 验证 Python 3.10
            python3.10 --version
            PYTHON_PATH=$(which python3.10)
            echo "Python 路径: $PYTHON_PATH"
          
            # 替换硬编码的 Windows Python 路径为 GitHub Actions 中的 Python 路径
            # 查找 buildPython 行并替换
            if grep -q "buildPython" pyramid/build.gradle; then
              # 如果已经有 buildPython，替换它
              sed -i "s|buildPython(\".*\")|buildPython(\"$PYTHON_PATH\")|g" pyramid/build.gradle
            else
              # 如果没有 buildPython，在 python { 块中添加
              sed -i "/python {/a\            buildPython \"$PYTHON_PATH\"" pyramid/build.gradle
            fi
          
            echo "Pyramid Python 环境配置完成"
          
            # 显示修改后的配置
            echo "=== pyramid/build.gradle python 配置 ==="
            sed -n '/python {/,/^[[:space:]]*}/p' pyramid/build.gradle
          fi
          
          # 移除 x86 架构
          if [ -f "app/build.gradle" ]; then
            sed -i '/x86 {/,/^[[:space:]]*}/d' app/build.gradle
            sed -i '/^[[:space:]]*$/N;/^\s*\n\s*$/d' app/build.gradle
          
            # 修改 applicationId 以允许与原版共存
            sed -i 's/applicationId "com\.fongmi\.android\.tv"/applicationId "com.fongmi.tv"/' app/build.gradle
          fi
          
          # 修改 AndroidManifest.xml
          if [ -f "app/src/main/AndroidManifest.xml" ]; then
            sed -i 's/android:authorities="com\.fongmi\.quickjs\.provider"/android:authorities="${applicationId}.quickjs.provider"/' app/src/main/AndroidManifest.xml
          fi
          
          # 修改更新检测 URL 为当前仓库（仅针对 FongMi/TV）
          if [ "${{ matrix.userName }}" == "FongMi" ] && [ "${{ matrix.repoName }}" == "TV" ]; then
            echo "修改更新检测 URL 为当前仓库: ${{ github.repository }}"
            REPO_OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
            REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
            UPDATE_URL="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/gh-pages/apk/${{ matrix.userName }}/${{ matrix.repoName }}/${{ matrix.branchName }}"
            if [ -f "app/src/main/java/com/fongmi/android/tv/utils/Github.java" ]; then
              sed -i "s|public static final String URL = \".*\";|public static final String URL = \"${UPDATE_URL}\";|" app/src/main/java/com/fongmi/android/tv/utils/Github.java
              echo "已更新 Github.java 中的 URL 为: ${UPDATE_URL}"
            fi
          fi
          
          # 为 zyqfork/TVBox 添加更新检测 URL 配置（如果将来需要添加更新检测功能）
          # 注意：zyqfork/TVBox 目前没有更新检测代码，这里只是为将来做准备
          if [ "${{ matrix.userName }}" == "zyqfork" ] && [ "${{ matrix.repoName }}" == "TVBox" ]; then
            echo "zyqfork/TVBox 目前没有更新检测功能，但已准备好版本检测 JSON 文件"
            echo "如需添加更新检测功能，可以参考 fongmi/tv 的实现方式"
          fi
          

      - name: Compress Source Code
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          #zip -q -x ".git/*" -x  ".github/*" -r source-${{ env.commitS }}.zip .
          tar -cJf source-${{ env.commitS }}.tar.xz --exclude=.git --exclude=.github *

      - name: Release Apk Sign
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          cp -f ${{ github.workspace }}/.github/workflows/TVBoxOSC.jks app/TVBoxOSC.jks
          if [ "${{ matrix.userName }}" == "FongMi" ] && [ "${{ matrix.repoName }}" == "TV" ]; then
            echo "FongMi/TV 使用原生 signingConfigs + local.properties，跳过 build.gradle 注入"
          else
            signingConfigs=''
            signingConfig='ICAgICAgICAgICAgaWYgKHByb2plY3QuaGFzUHJvcGVydHkoIlJFTEVBU0VfU1RPUkVfRklMRSIpKSB7XAogICAgICAgICAgICAgICAgc2lnbmluZ0NvbmZpZyA9IHNpZ25pbmdDb25maWdzLm15Q29uZmlnXAogICAgICAgICAgICB9XAo='
            signingConfigs="$(echo "$signingConfigs" |base64 -d )"
            signingConfig="$(echo "$signingConfig" |base64 -d )"
            sed -i -e "/defaultConfig {/i\\$signingConfigs " -e "/debug {/a\\$signingConfig " -e "/release {/a\\$signingConfig " app/build.gradle
            sed -i '$a\RELEASE_STORE_FILE=./TVBoxOSC.jks'     ./gradle.properties
            sed -i '$a\RELEASE_KEY_ALIAS=TVBoxOSC'            ./gradle.properties
            sed -i '$a\RELEASE_STORE_PASSWORD=TVBoxOSC'       ./gradle.properties
            sed -i '$a\RELEASE_KEY_PASSWORD=TVBoxOSC'         ./gradle.properties
          fi

      - name: Setup JDK
        if: ${{ env.commit }}
        uses: actions/setup-java@main
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.jdkVersion }}

      - name: Setup Gradle
        if: ${{ env.commit }}
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          if [ "${{ matrix.userName }}" == "FongMi" ] && [ "${{ matrix.repoName }}" == "TV" ]; then
            {
              echo "storeFile=./TVBoxOSC.jks"
              echo "keyAlias=TVBoxOSC"
              echo "storePassword=TVBoxOSC"
            } >> local.properties
          fi

      - name: Build With Gradle
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          chmod +x gradlew
          # 某些上游仓库 gradle.properties 末尾没有换行，直接 >> 可能与最后一行粘连
          printf '\n' >> gradle.properties
          for prop in "org.gradle.daemon=true" "org.gradle.parallel=true" "org.gradle.caching=true"; do
            key="${prop%%=*}"
            if grep -q "^${key}=" gradle.properties; then
              sed -i "s|^${key}=.*|${prop}|" gradle.properties
            else
              echo "${prop}" >> gradle.properties
            fi
          done
          ./gradlew assemblerelease --build-cache --parallel --daemon --warning-mode all

      - name: Prepare App
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          rm -rf apk/
          mkdir -p apk/
          find ~ -type d -iname "release" -print0 | while IFS= read -r -d '' dir; do
            find "$dir" -type f -name "*.apk" -exec sh -c 'cp "$1" "apk/${{ matrix.userName }}-${{ matrix.repoName }}-${{ matrix.branchName }}-${1##*/}"' sh {} \;
          done
          
          # 为 FongMi/TV 生成版本检测 JSON 文件
          if [ "${{ matrix.userName }}" == "FongMi" ] && [ "${{ matrix.repoName }}" == "TV" ]; then
            echo "生成版本检测 JSON 文件..."
            # 读取版本信息
            VERSION_CODE=$(grep "versionCode" app/build.gradle | head -1 | sed 's/.*versionCode //' | sed 's/[^0-9]//g')
            VERSION_NAME=$(grep "versionName" app/build.gradle | head -1 | sed 's/.*versionName "//' | sed 's/".*//')
            
            # 为每个 mode 生成一个 JSON 文件（leanback 和 mobile）
            for mode in leanback mobile; do
              # 检查是否存在该 mode 的 APK 文件
              if ls apk/FongMi-TV-${{ matrix.branchName }}-${mode}-*.apk 1> /dev/null 2>&1; then
                json_file="apk/${mode}.json"
                
                # 生成 JSON 文件
                printf '{\n  "name": "%s",\n  "desc": "版本 %s\\n构建时间: %s\\nCommit: %s",\n  "code": %s\n}' \
                  "${VERSION_NAME}" "${VERSION_NAME}" "${{ env.tag }}" "${{ env.commitS }}" "${VERSION_CODE}" > "$json_file"
                echo "已生成: $json_file (version: $VERSION_NAME, code: $VERSION_CODE)"
              fi
            done
          fi
          
          # 为 zyqfork/TVBox 生成版本检测 JSON 文件
          if [ "${{ matrix.userName }}" == "zyqfork" ] && [ "${{ matrix.repoName }}" == "TVBox" ]; then
            echo "生成 zyqfork/TVBox 版本检测 JSON 文件..."
            # 读取版本信息
            VERSION_CODE=$(grep "versionCode" app/build.gradle | head -1 | sed 's/.*versionCode //' | sed 's/[^0-9]//g')
            VERSION_NAME=$(grep "versionName" app/build.gradle | head -1 | sed 's/.*versionName "//' | sed 's/".*//')
            
            # 为每个 flavor 组合生成 JSON 文件
            # zyqfork/TVBox 的 APK 文件名格式: zyqfork-TVBox-{branch}-TVBox_release-{brand}-{abi}-{mode}.apk
            for apk_file in apk/zyqfork-TVBox-${{ matrix.branchName }}-*.apk; do
              if [ -f "$apk_file" ]; then
                filename=$(basename "$apk_file")
                # 提取 flavor 信息（例如：zyqfork-TVBox-main-TVBox_release-generic-arm64-java.apk）
                # 移除前缀 "zyqfork-TVBox-{branch}-"
                flavor_part=$(echo "$filename" | sed "s/zyqfork-TVBox-${{ matrix.branchName }}-//" | sed 's/\.apk$//')
                # 提取 TVBox_release- 后面的部分
                if [[ "$flavor_part" =~ ^TVBox_release-(.+)$ ]]; then
                  flavors="${BASH_REMATCH[1]}"
                  # 生成 JSON 文件名：使用分支名和 flavor 组合作为标识
                  json_file="apk/${flavors}-${{ matrix.branchName }}.json"
                  
                  # 生成 JSON 文件
                  printf '{\n  "name": "%s",\n  "desc": "版本 %s\\n构建时间: %s\\nCommit: %s",\n  "code": %s\n}' \
                    "${VERSION_NAME}" "${VERSION_NAME}" "${{ env.tag }}" "${{ env.commitS }}" "${VERSION_CODE}" > "$json_file"
                  echo "已生成: $json_file (version: $VERSION_NAME, code: $VERSION_CODE)"
                fi
              fi
            done
          fi

      - name: Release Note
        if: ${{ env.commit }}
        working-directory: TVBoxOSC
        run: |
          # 尝试获取上一次的 commit hash
          lastCommit=$(grep "\[${{ matrix.userName }}\/${{ matrix.repoName }}\]" ${{ github.workspace }}/README.md | grep "${{ matrix.branchName }}" | grep -o '[a-z0-9]\{40\}')
          
          # 如果没有找到 commit hash,设置一个默认值以避免错误
          if [ -z "$lastCommit" ]; then
            echo "Warning: Could not find last commit hash for ${{ matrix.userName }}/${{ matrix.repoName }}/${{ matrix.branchName }}"
            lastCommit=${{ env.commit }}
          fi
          
          export LESSCHARSET=utf-8
          # 确保 apk 目录存在
          mkdir -p apk/
          echo -e "Credit: [${{ matrix.userName }}](${{ env.upStream }})\nCommit: ${{ env.commit }}\nChangelog:\n\`\`\`" > apk/${{ matrix.userName }}-Release.log
          
          if [ "${{ env.commit }}" == "${lastCommit}" ]; then
            git log --pretty=format:%B ${{ env.commitS }} -1 | sed -e "s# \{2,\}#\n#g" -e "/^Merge \(pull\|branch\|remote\)/d" -e '/^$/d' | cat -n | sort -k2,2 -k1,1n | uniq -f1 | sort -k1,1n | cut -f2- >> apk/${{ matrix.userName }}-Release.log
          else
            git log --pretty=format:%B ${{ env.commitS }}...${lastCommit:0:7} | sed -e "s# \{2,\}#\n#g" -e "/^Merge \(pull\|branch\|remote\)/d" -e '/^$/d' | cat -n | sort -k2,2 -k1,1n | uniq -f1 | sort -k1,1n | cut -f2- >> apk/${{ matrix.userName }}-Release.log
          fi
          echo -e '```' >> apk/${{ matrix.userName }}-Release.log
          
          # 确保日志文件存在并且有内容
          if [ ! -s "apk/${{ matrix.userName }}-Release.log" ]; then
            echo "No changes found" >> apk/${{ matrix.userName }}-Release.log
          fi

      - name: Upload App To Artifact
        uses: actions/upload-artifact@v4
        if: ${{ env.commit }}
        with:
          name: ${{ matrix.userName }}-${{ matrix.repoName }}-${{ matrix.branchName }}
          path: |
            TVBoxOSC/apk/*

      - name: Whether Or Not to Publish
        if: ${{ inputs.donotpublish && env.commit }}
        run: |
          echo "commit=" >> $GITHUB_ENV

      - name: Release and Upload Assets
        uses: ncipollo/release-action@main
        if: ${{ env.commit }}
        with:
          name: ${{ matrix.userName }}_${{ matrix.repoName }}_${{ matrix.branchName }}_${{ env.tag }}
          tag: ${{ matrix.userName }}_${{ matrix.repoName }}_${{ matrix.branchName }}_${{ env.tag }}
          bodyFile: TVBoxOSC/apk/${{ matrix.userName }}-Release.log
          allowUpdates: true
          removeArtifacts: true
          artifacts: |
            TVBoxOSC/apk/*.apk
            TVBoxOSC/source-${{ env.commitS }}.*

      - uses: dev-drprasad/delete-older-releases@master
        with:
          keep_latest: 5
          delete_tags: true
          delete_tag_pattern: ${{ matrix.userName }}_${{ matrix.repoName }}_${{ matrix.branchName }}.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Update Files to gh-pages
        if: ${{ env.commit && ((matrix.userName == 'FongMi' && matrix.repoName == 'TV') || (matrix.userName == 'zyqfork' && matrix.repoName == 'TVBox')) }}
        run: |
          echo "部署更新文件到 gh-pages 分支..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 克隆仓库并切换到 gh-pages 分支
          git clone --depth=1 --branch=gh-pages "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages-repo 2>/dev/null || git clone --depth=1 "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages-repo
          cd gh-pages-repo
          
          # 如果 gh-pages 分支不存在，创建它
          if ! git rev-parse --verify gh-pages >/dev/null 2>&1; then
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          else
            git checkout gh-pages 2>/dev/null || git checkout -b gh-pages
          fi
          
          # 创建按仓库名和分支名组织的目录结构
          APK_DIR="apk/${{ matrix.userName }}/${{ matrix.repoName }}/${{ matrix.branchName }}"
          mkdir -p "$APK_DIR"
          
          # 处理 FongMi/TV 的文件
          if [ "${{ matrix.userName }}" == "FongMi" ] && [ "${{ matrix.repoName }}" == "TV" ]; then
            # 复制 JSON 文件
            cp -f ${{ github.workspace }}/TVBoxOSC/apk/*.json "$APK_DIR/" 2>/dev/null || true
            # 复制 APK 文件
            cp -f ${{ github.workspace }}/TVBoxOSC/apk/FongMi-TV-${{ matrix.branchName }}-*.apk "$APK_DIR/" 2>/dev/null || true
            # 重命名 APK 文件以匹配更新检测的命名格式
            cd "$APK_DIR"
            for file in FongMi-TV-${{ matrix.branchName }}-*.apk; do
              if [ -f "$file" ]; then
                # 提取 flavor 信息（例如：FongMi-TV-fongmi-leanback-arm64_v8a.apk -> leanback-arm64_v8a.apk）
                newname=$(echo "$file" | sed 's/FongMi-TV-${{ matrix.branchName }}-//')
                if [ "$file" != "$newname" ]; then
                  mv "$file" "$newname"
                  echo "重命名: $file -> $newname"
                fi
              fi
            done
            cd ../..
          fi
          
          # 处理 zyqfork/TVBox 的文件
          if [ "${{ matrix.userName }}" == "zyqfork" ] && [ "${{ matrix.repoName }}" == "TVBox" ]; then
            # 复制 JSON 文件（匹配当前分支的 JSON 文件）
            cp -f ${{ github.workspace }}/TVBoxOSC/apk/*-${{ matrix.branchName }}.json "$APK_DIR/" 2>/dev/null || true
            # 复制 APK 文件
            cp -f ${{ github.workspace }}/TVBoxOSC/apk/zyqfork-TVBox-${{ matrix.branchName }}-*.apk "$APK_DIR/" 2>/dev/null || true
            # 重命名 APK 文件以匹配更新检测的命名格式
            cd "$APK_DIR"
            for file in zyqfork-TVBox-${{ matrix.branchName }}-*.apk; do
              if [ -f "$file" ]; then
                # 提取文件名（例如：zyqfork-TVBox-main-TVBox_release-generic-arm64-java.apk -> TVBox_release-generic-arm64-java.apk）
                # 移除前缀 "zyqfork-TVBox-{branch}-"
                newname=$(echo "$file" | sed "s/zyqfork-TVBox-${{ matrix.branchName }}-//")
                if [ "$file" != "$newname" ]; then
                  mv "$file" "$newname"
                  echo "重命名: $file -> $newname"
                fi
              fi
            done
            cd ../..
          fi
          
          # 提交更改
          git add -A
          if git diff --staged --quiet; then
            echo "没有更改需要提交"
          else
            git commit -m "Update ${{ matrix.userName }}/${{ matrix.repoName }}/${{ matrix.branchName }} version files - ${{ env.tag }}"
            git push origin gh-pages
            echo "已更新 gh-pages 分支: $APK_DIR"
          fi

      - name: Push to master
        if: ${{ env.commit }}
        run: |
          rm -rf TVBoxOSC
          sed -i '/url =/d' ./.git/config
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url --add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git pull --rebase
          
          # 获取当前时间
          current_time=$(date '+%Y-%m-%d %H:%M:%S')
          
          # 更新对应仓库的 commit hash 和构建时间
          sed -i "/\[${{ matrix.userName }}\/${{ matrix.repoName }}\].*${{ matrix.branchName }}/{
            s/[a-z0-9]\{40\}/${{ env.commit }}/
            s/| [^|]* |$/| $current_time |/
          }" README.md
          
          # 更新底部的更新时间
          sed -i "s/update at .*/update at ${current_time}/" README.md
          
          git add --all
          git commit -m "Update ${{ matrix.userName }}/${{ matrix.repoName }} to ${{ env.commit }} at ${current_time}"
          git push -u -f origin master

  clean:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Delete workflow runs
        uses: GitRML/delete-workflow-runs@main
        with:
          retain_days: 1
          keep_minimum_runs: 3
